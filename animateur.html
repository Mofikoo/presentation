<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Présentation des normes</title>
<style>
  * { box-sizing: border-box; }

  /* Empêche la sélection de texte sur toute la page */
  body {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    color: white;
    min-height: 100vh;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    text-align: center;
    padding: 24px 0;
  }
  header h1 { font-size: 18px; margin: 0; }

  .video-wrapper {
    position: relative;
    background: black;
    border-radius: 8px;
    overflow: hidden;
  }

  video {
    width: 100%;
    display: block;
    /* Empêche le menu contextuel natif "télécharger" sur certains navigateurs */
    pointer-events: auto;
  }

  /* Watermark dynamique : nom + heure, en filigrane semi-transparent */
  .watermark {
    position: absolute;
    pointer-events: none;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    font-weight: 600;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    z-index: 10;
    white-space: nowrap;
  }

  .pdf-section {
    margin-top: 32px;
  }
  .pdf-page {
    position: relative;
    margin-bottom: 16px;
    border-radius: 8px;
    overflow: hidden;
  }
  .pdf-page img {
    width: 100%;
    display: block;
    pointer-events: none; /* empêche drag/drop de l'image */
  }

  .overlay-blocked {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    text-align: center;
    padding: 20px;
  }
  .overlay-blocked.active { display: flex; }
  .overlay-blocked p { max-width: 400px; line-height: 1.5; }

  .status-message {
    text-align: center;
    padding: 80px 20px;
    font-size: 16px;
  }
</style>
</head>
<body>

<!-- Overlay plein écran si DevTools détecté ou contenu masqué pour autre raison -->
<div class="overlay-blocked" id="blockOverlay">
  <p>Le contenu a été masqué car une activité non autorisée a été détectée (outils développeur, capture d'écran, ou changement de fenêtre). Revenez sur cette page normalement pour continuer le visionnage.</p>
</div>

<div class="container" id="mainContainer">
  <div class="status-message" id="loadingMessage">Vérification de votre accès...</div>
</div>

<script>
  // ============================================
  // CONFIGURATION
  // ============================================
  // ⚠️ À MODIFIER : URL de ta Edge Function de vérification
  const EDGE_FUNCTION_URL = "https://jhijrmbftkunhririlqo.supabase.co/functions/v1/smooth-api";

  // ============================================
  // 1. RÉCUPÉRATION DU TOKEN DEPUIS L'URL
  // ============================================
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get("token");

  const mainContainer = document.getElementById("mainContainer");

  if (!token) {
    mainContainer.innerHTML = '<div class="status-message">Lien invalide : aucun token fourni.</div>';
  } else {
    verifyAndLoad();
  }

  async function verifyAndLoad() {
    alert("URL fonction : " + EDGE_FUNCTION_URL);
    alert("URL : " + EDGE_FUNCTION_URL + "\nToken : " + token);
    try {
      const response = await fetch(EDGE_FUNCTION_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoaWpybWJmdGt1bmhyaXJpbHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTY0MzIsImV4cCI6MjA5NzM3MjQzMn0.9XmSW8cvNX7CWFQf5KCR0wDdBUXik7kzd80iLHEh_CQ"  // ← ajoute cette ligne
        },
        body: JSON.stringify({ token }),
      });

      const data = await response.json();
      alert("Réponse : " + response.status + " / " + JSON.stringify(data));

      if (!response.ok) {
        mainContainer.innerHTML = `<div class="status-message">${data.error || "Accès refusé."}</div>`;
        return;
      }

      renderContent(data);
      // On revérifie le token toutes les 5 minutes pendant le visionnage,
      // au cas où il expire pendant que la personne regarde.
      setInterval(() => recheckStillValid(), 5 * 60 * 1000);

    } catch (err) {
        alert("Erreur : " + err.message);
      mainContainer.innerHTML = '<div class="status-message">Erreur de connexion. Réessayez plus tard.</div>';
    }
  }

  async function recheckStillValid() {
    const response = await fetch(EDGE_FUNCTION_URL, {
      method: "POST",
      headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoaWpybWJmdGt1bmhyaXJpbHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTY0MzIsImV4cCI6MjA5NzM3MjQzMn0.9XmSW8cvNX7CWFQf5KCR0wDdBUXik7kzd80iLHEh_CQ"  // ← ajoute cette ligne
        },
      body: JSON.stringify({ token }),
    });
    if (!response.ok) {
      // Le lien a expiré pendant le visionnage : on coupe tout.
      mainContainer.innerHTML = '<div class="status-message">Votre accès à cette page a expiré.</div>';
    }
  }

  // ============================================
  // 2. AFFICHAGE DU CONTENU (vidéo + PDF)
  // ============================================
  function renderContent(data) {
    mainContainer.innerHTML = `
      <header><h1>Présentation des normes de l'entreprise</h1></header>

     <div class="video-wrapper" id="videoWrapper">
        <div style="padding:56.25% 0 0 0; position:relative;">
            <iframe
            id="mainVideo"
            src="https://drive.google.com/file/d/1zCPfjwwkhLRst73Yz-sNH0XHwnK604-G/view?usp=sharing/preview"
            style="position:absolute;top:0;left:0;width:100%;height:100%;"
            frameborder="0"
            allow="autoplay"
            allowfullscreen>
            </iframe>
        </div>
    </div>

      <div class="pdf-section" id="pdfSection"></div>
    `;

    // Watermarks répétés sur la vidéo (plusieurs positions pour gêner
    // tout recadrage d'une capture)
    addWatermarks("videoWrapper", data.animatorName);

    // Affichage des pages du PDF (en images, jamais le PDF lui-même)
    const pdfSection = document.getElementById("pdfSection");
    data.pdfPageUrls.forEach((url, i) => {
      const pageDiv = document.createElement("div");
      pageDiv.className = "pdf-page";
      pageDiv.innerHTML = `<img src="${url}" alt="Page ${i + 1}" draggable="false">`;
      pdfSection.appendChild(pageDiv);
      addWatermarks(pageDiv, data.animatorName, true);
    });
  }

  // ============================================
  // 3. WATERMARK DYNAMIQUE (nom + heure en direct)
  // ============================================
  function addWatermarks(containerOrId, name, isLocal) {
    const container = typeof containerOrId === "string"
      ? document.getElementById(containerOrId)
      : containerOrId;

    // 3 watermarks répartis pour que le recadrage d'une photo ne les
    // élimine pas facilement
    const positions = [
      { top: "10%", left: "5%" },
      { top: "50%", left: "60%" },
      { top: "85%", left: "15%" },
    ];

    positions.forEach(pos => {
      const wm = document.createElement("div");
      wm.className = "watermark";
      wm.style.top = pos.top;
      wm.style.left = pos.left;
      container.style.position = container.style.position || "relative";
      container.appendChild(wm);
      updateWatermarkText(wm, name);
    });
  }

  function updateWatermarkText(el, name) {
    const now = new Date().toLocaleString("fr-FR");
    el.textContent = `${name} — ${now}`;
  }

  // Met à jour l'heure affichée toutes les secondes
  setInterval(() => {
    document.querySelectorAll(".watermark").forEach(el => {
      const name = el.textContent.split(" — ")[0];
      updateWatermarkText(el, name);
    });
  }, 1000);

  // ============================================
  // 4. PROTECTIONS ANTI-CAPTURE / ANTI-TÉLÉCHARGEMENT
  // ============================================

  // Bloque le clic droit (menu contextuel)
  document.addEventListener("contextmenu", (e) => e.preventDefault());

  // Bloque le glisser-déposer des images/vidéos
  document.addEventListener("dragstart", (e) => e.preventDefault());

  // Bloque les raccourcis clavier sensibles
  document.addEventListener("keydown", (e) => {
    const blockedCombos = [
      { ctrl: true, key: "s" },       // Enregistrer la page
      { ctrl: true, key: "p" },       // Imprimer
      { ctrl: true, shift: true, key: "i" }, // DevTools
      { ctrl: true, shift: true, key: "j" }, // Console
      { ctrl: true, shift: true, key: "c" }, // Inspecteur
      { ctrl: true, key: "u" },       // Voir source
    ];

    for (const combo of blockedCombos) {
      const ctrlMatch = combo.ctrl ? (e.ctrlKey || e.metaKey) : true;
      const shiftMatch = combo.shift ? e.shiftKey : true;
      if (ctrlMatch && shiftMatch && e.key.toLowerCase() === combo.key) {
        e.preventDefault();
        return;
      }
    }

    // F12 (DevTools)
    if (e.key === "F12") {
      e.preventDefault();
    }
  });

  // Pause automatique de la vidéo quand l'onglet perd le focus
  // (utile si quelqu'un switch vers un logiciel d'enregistrement d'écran)
  document.addEventListener("visibilitychange", () => {
    const video = document.getElementById("mainVideo");
    if (document.hidden && video && !video.paused) {
      video.pause();
    }
  });

  // Détection basique d'ouverture des DevTools (par différence de taille
  // fenêtre interne/externe). Imparfait mais dissuasif.
  let devtoolsCheckInterval = setInterval(() => {
    const threshold = 160;
    const widthDiff = window.outerWidth - window.innerWidth;
    const heightDiff = window.outerHeight - window.innerHeight;
    if (widthDiff > threshold || heightDiff > threshold) {
      document.getElementById("blockOverlay").classList.add("active");
      const video = document.getElementById("mainVideo");
      if (video) video.pause();
    } else {
      document.getElementById("blockOverlay").classList.remove("active");
    }
  }, 1000);
</script>

</body>
</html>
