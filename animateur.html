<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Présentation des normes</title>
<style>
  * { box-sizing: border-box; }

  body {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    color: white;
    min-height: 100vh;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    text-align: center;
    padding: 24px 0;
  }
  header h1 { font-size: 18px; margin: 0; }

  .video-wrapper {
    position: relative;
    background: black;
    border-radius: 8px;
    /* PAS de overflow:hidden ici, ça cassait le faux-fullscreen */
  }

  .watermark {
    position: absolute;
    pointer-events: none;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    font-weight: 600;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    z-index: 10;
    white-space: nowrap;
  }

  .pdf-section { margin-top: 32px; }
  .pdf-page {
    position: relative;
    margin-bottom: 16px;
    border-radius: 8px;
    overflow: hidden;
  }
  .pdf-page img {
    width: 100%;
    display: block;
    pointer-events: none;
  }

  .overlay-blocked {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    text-align: center;
    padding: 20px;
  }
  .overlay-blocked.active { display: flex; }
  .overlay-blocked p { max-width: 400px; line-height: 1.5; }

  .status-message {
    text-align: center;
    padding: 80px 20px;
    font-size: 16px;
  }

  .video-fullscreen-btn {
    display: block;
    margin: 8px auto 0;
    padding: 8px 20px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .video-fullscreen-btn:hover { background: rgba(255,255,255,0.2); }

  /* Faux plein écran : la vidéo occupe toute la fenêtre du navigateur */
  .video-wrapper.faux-fullscreen {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    max-width: none !important;
    z-index: 1000;
    border-radius: 0;
    background: black;
    margin: 0;
  }

  .video-wrapper.faux-fullscreen #videoRatio {
    padding-top: 0 !important;
    position: absolute !important;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
  }

  .video-wrapper.faux-fullscreen iframe {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
  }
</style>
</head>
<body>

<div class="overlay-blocked" id="blockOverlay">
  <p>Le contenu a été masqué car une activité non autorisée a été détectée. Revenez sur cette page normalement pour continuer le visionnage.</p>
</div>

<div class="container" id="mainContainer">
  <div class="status-message">Vérification de votre accès...</div>
</div>

<script>
  const EDGE_FUNCTION_URL = "https://jhijrmbftkunhririlqo.supabase.co/functions/v1/smooth-api";
  const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoaWpybWJmdGt1bmhyaXJpbHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTY0MzIsImV4cCI6MjA5NzM3MjQzMn0.9XmSW8cvNX7CWFQf5KCR0wDdBUXik7kzd80iLHEh_CQ";

  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get("token");
  const mainContainer = document.getElementById("mainContainer");

  if (!token) {
    mainContainer.innerHTML = '<div class="status-message">Lien invalide : aucun token fourni.</div>';
  } else {
    verifyAndLoad();
  }

  async function verifyAndLoad() {
    try {
      const response = await fetch(EDGE_FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + ANON_KEY
        },
        body: JSON.stringify({ token }),
      });

      const data = await response.json();

      if (!response.ok) {
        mainContainer.innerHTML = `<div class="status-message">${data.error || "Accès refusé."}</div>`;
        return;
      }

      renderContent(data);
      setInterval(() => recheckStillValid(), 5 * 60 * 1000);

    } catch (err) {
      mainContainer.innerHTML = '<div class="status-message">Erreur de connexion. Réessayez plus tard.</div>';
    }
  }

  async function recheckStillValid() {
    const response = await fetch(EDGE_FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + ANON_KEY
      },
      body: JSON.stringify({ token }),
    });
    if (!response.ok) {
      mainContainer.innerHTML = '<div class="status-message">Votre accès à cette page a expiré.</div>';
    }
  }

  function renderContent(data) {
    mainContainer.innerHTML = `
      <header><h1>Présentation des normes de l'entreprise</h1></header>

      <div class="video-wrapper" id="videoWrapper">
        <div id="videoRatio" style="padding-top:56.25%; position:relative;">
          <iframe
            id="mainVideo"
            src="https://drive.google.com/file/d/1zCPfjwwkhLRst73Yz-sNH0XHwnK604-G/preview"
            style="position:absolute;top:0;left:0;width:100%;height:100%;"
            frameborder="0"
            allow="autoplay">
          </iframe>
        </div>
      </div>

      <button class="video-fullscreen-btn" id="fullscreenBtn" onclick="toggleFauxFullscreen()">
        ⛶ Agrandir la vidéo
      </button>

      <div class="pdf-section" id="pdfSection"></div>
    `;

    addWatermarks("videoWrapper", data.animatorName);

    const pdfSection = document.getElementById("pdfSection");
    data.pdfPageUrls.forEach((url, i) => {
      const pageDiv = document.createElement("div");
      pageDiv.className = "pdf-page";
      pageDiv.innerHTML = `<img src="${url}" alt="Page ${i + 1}" draggable="false">`;
      pdfSection.appendChild(pageDiv);
      addWatermarks(pageDiv, data.animatorName, true);
    });
  }

  // ============================================
  // FAUX PLEIN ÉCRAN
  // ============================================
  function toggleFauxFullscreen() {
    const wrapper = document.getElementById("videoWrapper");
    const btn = document.getElementById("fullscreenBtn");
    const isFullscreen = wrapper.classList.toggle("faux-fullscreen");

    if (isFullscreen) {
      btn.textContent = "✕ Réduire la vidéo";
      btn.style.cssText = `
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1002;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      `;
      document.body.style.overflow = "hidden";
    } else {
      btn.textContent = "⛶ Agrandir la vidéo";
      btn.style.cssText = "";
      document.body.style.overflow = "";
    }
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      const wrapper = document.getElementById("videoWrapper");
      if (wrapper && wrapper.classList.contains("faux-fullscreen")) {
        toggleFauxFullscreen();
      }
    }
  });

  // ============================================
  // WATERMARK
  // ============================================
  function addWatermarks(containerOrId, name) {
    const container = typeof containerOrId === "string"
      ? document.getElementById(containerOrId)
      : containerOrId;

    const positions = [
      { top: "10%", left: "5%" },
      { top: "50%", left: "60%" },
      { top: "85%", left: "15%" },
    ];

    positions.forEach(pos => {
      const wm = document.createElement("div");
      wm.className = "watermark";
      wm.style.top = pos.top;
      wm.style.left = pos.left;
      container.style.position = "relative";
      container.appendChild(wm);
      updateWatermarkText(wm, name);
    });
  }

  function updateWatermarkText(el, name) {
    const now = new Date().toLocaleString("fr-FR");
    el.textContent = `${name} — ${now}`;
  }

  setInterval(() => {
    document.querySelectorAll(".watermark").forEach(el => {
      const name = el.textContent.split(" — ")[0];
      updateWatermarkText(el, name);
    });
  }, 1000);

  // ============================================
  // PROTECTIONS
  // ============================================
  document.addEventListener("contextmenu", (e) => e.preventDefault());
  document.addEventListener("dragstart", (e) => e.preventDefault());

  document.addEventListener("keydown", (e) => {
    const blockedCombos = [
      { ctrl: true, key: "s" },
      { ctrl: true, key: "p" },
      { ctrl: true, shift: true, key: "i" },
      { ctrl: true, shift: true, key: "j" },
      { ctrl: true, shift: true, key: "c" },
      { ctrl: true, key: "u" },
    ];
    for (const combo of blockedCombos) {
      const ctrlMatch = combo.ctrl ? (e.ctrlKey || e.metaKey) : true;
      const shiftMatch = combo.shift ? e.shiftKey : true;
      if (ctrlMatch && shiftMatch && e.key.toLowerCase() === combo.key) {
        e.preventDefault();
        return;
      }
    }
    if (e.key === "F12") e.preventDefault();
  });

  document.addEventListener("visibilitychange", () => {
    const video = document.getElementById("mainVideo");
    if (document.hidden && video && !video.paused) video.pause();
  });

  setInterval(() => {
    const threshold = 160;
    const widthDiff = window.outerWidth - window.innerWidth;
    const heightDiff = window.outerHeight - window.innerHeight;
    if (widthDiff > threshold || heightDiff > threshold) {
      document.getElementById("blockOverlay").classList.add("active");
      const video = document.getElementById("mainVideo");
      if (video) video.pause();
    } else {
      document.getElementById("blockOverlay").classList.remove("active");
    }
  }, 1000);
</script>

</body>
</html>
